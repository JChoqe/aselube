<!DOCTYPE html>
<html qva-bootstrap="false" ng-controller="PageControllerCtrl">
<head>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Jherlan Qlik</title>
    <meta charset="utf-8">
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="HandheldFriendly" content="True">
    <meta name="MobileOptimized" content="320">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta http-equiv="cleartype" content="on">

    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <link rel="stylesheet" href="../../resources/autogenerated/qlik-styles.css">

    <link type="text/css" href="include/bootstrap-4/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link href="css/animate.css" rel="stylesheet" />
    <link href="css/normalize.min.css" rel="stylesheet" />
    <link href="css/icofont.css" rel="stylesheet" />
    <link href="include/jquery-ui-1.12.1/jquery-ui.min.css" rel="stylesheet" />    
    <link href="include/jquery-toast/jquery.toast.min.css" rel="stylesheet" />
    <link href="include/select2/css/select2.min.css" rel="stylesheet" />
    <link href="css/wellcome.css" rel="stylesheet" />
    <link href="css/main.css" rel="stylesheet" />
    <link ng-if="darkView" href="css/estilos/dark.css" rel="stylesheet" />
    <link href="css/media-queries-for-standard-devices.css" rel="stylesheet" />
    <link href="css/customStyle.css" rel="stylesheet" />


    <script src="../../resources/assets/external/requirejs/require.js"></script>
    <script src="include/jquery-toast/jquery.toast.min.js"></script>
    <script src="include/particles/particles.min.js"></script>
    <script src="js/require-config.js"></script>

</head>
<body id="main" class="qui-dark" ng-class="[OpenSidebarMenu == true ? 'sidebar-collapsed' : '', darkView == true ? 'mz-dark':'mz-white']" data-app="">
    <ui-view></ui-view>
    <errorsmanagement></errorsmanagement>

    <div id="panel_help_wellcome" ng-controller="WellcomeCtrl" ng-if="demo">
        <button id="btn_help_into" ng-click="toogleHelp();">
            <i class="icofont icofont-question-circle ico-30"></i> Vídeos de ayuda
        </button>
        <div class="panel-body container">
            <div class="coverScroll">
                <div class="scrollPanel">
                    <ul id="videosHelp">

                        <li class="itemVideo" ng-click="getVideoHelp('assets/videoHelp/video/VideoAyuda-Introduccion.mp4', 'Introducción')">
                            <div class="imgVideo">
                                <img class="videoPortada" src="assets/videoHelp/imgMini/ICO-Video-Ayuda.jpg" />
                                <div class="cover_video">
                                    <!--<i class="icofont icofont-youtube-play ico-18" style="color:#d92222;"></i>-->
                                </div>
                            </div>
                            <div class="textVideo">
                                <span class="number_help">1</span><span class="text_help">Introducción</span>
                            </div>
                        </li>
                        <li class="itemVideo" ng-click="getVideoHelp('assets/videoHelp/video/VideoAyuda-Navegacion.mp4','Navegación')">
                            <div class="imgVideo">
                                <img class="videoPortada" src="assets/videoHelp/imgMini/ICO-Video-Ayuda.jpg" />
                                <div class="cover_video">
                                    <!--<i class="icofont icofont-youtube-play ico-18" style="color:#d92222;"></i>-->
                                </div>
                            </div>
                            <div class="textVideo">
                                <span class="number_help">2</span><span class="text_help">Navegación</span>
                                <!--<p>Descripción Video</p>-->
                            </div>
                        </li>
                        <li class="itemVideo" ng-click="getVideoHelp('assets/videoHelp/video/VideoAyuda-SeleccionenGrafico.mp4', 'Seleccion en Gráficos')">
                            <div class="imgVideo">
                                <img class="videoPortada" src="assets/videoHelp/imgMini/ICO-Video-Ayuda.jpg" />
                                <div class="cover_video">
                                    <!--<i class="icofont icofont-youtube-play ico-18" style="color:#d92222;"></i>-->
                                </div>
                            </div>
                            <div class="textVideo">
                                <span class="number_help">3</span><span class="text_help">Seleccion en Gráficos</span>
                            </div>
                        </li>
                        <li class="itemVideo" ng-click="getVideoHelp('assets/videoHelp/video/VideoAyuda-OrdenarTablas.mp4', 'Ordenar Tablas')">
                            <div class="imgVideo">
                                <img class="videoPortada" src="assets/videoHelp/imgMini/ICO-Video-Ayuda.jpg" />
                                <div class="cover_video">
                                    <!--<i class="icofont icofont-youtube-play ico-18" style="color:#d92222;"></i>-->
                                </div>
                            </div>
                            <div class="textVideo">
                                <span class="number_help">4</span><span class="text_help">Ordenar Tablas</span>
                            </div>
                        </li>
                        <li class="itemVideo" ng-click="getVideoHelp('assets/videoHelp/video/VideoAyuda-ExportarDatos.mp4', 'Exportar Datos')">
                            <div class="imgVideo">
                                <img class="videoPortada" src="assets/videoHelp/imgMini/ICO-Video-Ayuda.jpg" />
                                <div class="cover_video">
                                    <!--<i class="icofont icofont-youtube-play ico-18" style="color:#d92222;"></i>-->
                                </div>
                            </div>
                            <div class="textVideo">
                                <span class="number_help">5</span><span class="text_help">Exportar Datos</span>
                            </div>
                        </li>
                        <li class="itemVideo" ng-click="getVideoHelp('assets/videoHelp/video/VideoAyuda-VistasAlternativas.mp4', 'Vistas Alternativas')">
                            <div class="imgVideo">
                                <img class="videoPortada" src="assets/videoHelp/imgMini/ICO-Video-Ayuda.jpg" />
                                <div class="cover_video">
                                    <!--<i class="icofont icofont-youtube-play ico-18" style="color:#d92222;"></i>-->
                                </div>
                            </div>
                            <div class="textVideo">
                                <span class="number_help">6</span><span class="text_help">Vistas Alternativas</span>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>


    <!-- Modal Help-->
    <div class="modal fade" id="modalVideoHelp" tabindex="-1" role="dialog" aria-labelledby="videoHelpTitulo" ng-controller="WellcomeCtrl" ng-if="demo">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title" id="videoHelpTitulo">Modal title</h4>
                </div>
                <div class="modal-body" id="containerVideoHelp">
                    <video controls id="video_help" style="width: 100%; height: auto; margin:0 auto; frameborder:0;">
                        <source src="" type="video/mp4">
                        Your browser doesn't support HTML5 video tag.
                    </video>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal" ng-click="closeVideoHelp()">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
