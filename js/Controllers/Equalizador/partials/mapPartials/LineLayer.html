<div class="em-item em-item-inner em-checkbox-component">
    <div class="value">
        <label class="lui-checkbox lui-checkbox--inverse">
            <input class="lui-checkbox__input" type="checkbox" ng-model="item.show" tid="value" ng-change="changeCapa(item)" aria-invalid="false">
            <div class="lui-checkbox__check-wrap">
                <span class="lui-checkbox__check"></span>
                <span class="lui-checkbox__check-text label" aria-disabled="false">{{'equalizer.label.mostrarcapa' | translate}}</span>
            </div>
        </label>
    </div>
</div>
<div class="em-switch-component border-bottom">
    <div class="label" aria-disabled="false">
        <div class="title">{{'equalizer.label.mostraretiqueta' | translate}}</div>
        <div class="value" ng-if="item.showLabel">{{'equalizer.label.activado' | translate}}</div>
        <div class="value" ng-if="!item.showLabel">{{'equalizer.label.desactivado' | translate}}</div>
    </div>
    <div lui-class-list="classList" class="lui-switch lui-switch--inverse">
        <label class="lui-switch__label">
            <input type="checkbox" ng-model="item.showLabel" class="lui-switch__checkbox " ng-change="changeLabel(item)" aria-invalid="false">
            <span class="lui-switch__wrap">
                <span class="lui-switch__inner"></span>
                <span class="lui-switch__switch"></span>
            </span>
        </label>
    </div>
</div>
<div class="em-item em-slider-component">
    <div class="label">{{'equalizer.label.rangolinea' | translate}}</div>
    <div class="value">
        <div class="slider" id="slider-lineLayer-{{item.orden}}" ng-model="value"></div>
    </div>
</div>
