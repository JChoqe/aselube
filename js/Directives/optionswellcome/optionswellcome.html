<div id="demo-nifty-settings" class="demo-nifty-settings">
    <button id="demo-set-btn" class="btn" ng-click="toogleOptionsportada();">
        <i class="icofont icofont-gears"></i>
    </button>
    <div id="demo-set-content" class="demo-set-content">
        <div class="col-lg-12">
            <h5 class="tx-sans">Imagen Portada</h5>
            <hr class="new-section-xs">
            <ul class="themecolors listaBgImage listaBgImagePortada">
                <li class="link-temas" ng-repeat="imagen in imagenes" ng-click="activeItem($event)" data-sa-value="{{$index}}">
                    <div class="coverSidebarImageList"></div>
                    <a href="javascript:void(0)" theme="{{imagen.nombre}}" data-background-image="{{imagen.nombre}}" style="background-image:url({{imagen.url}})"></a>
                </li>
            </ul>
        </div>


        <div class="col-lg-12">
            <h5 class="tx-sans">Imagen Portada Efectos</h5>
            <hr class="new-section-xs">
            <ul class="list-effects">
                <li class="list-slider">
                    <label class="slider-label">Blur</label>
                    <div class="slider" id="slider-blur" ng-model="value">
                        <div id="custom-handle-blur" class="ui-slider-handle"></div>
                    </div>
                </li>

                <li class="list-slider">
                    <label class="slider-label">Saturate</label>
                    <div class="slider" id="slider-saturate" ng-model="value">
                        <div id="custom-handle-saturate" class="ui-slider-handle"></div>
                    </div>
                </li>

                <li class="list-slider">
                    <label class="slider-label">Contrast</label>
                    <div class="slider" id="slider-contrast" ng-model="value">
                        <div id="custom-handle-contrast" class="ui-slider-handle"></div>
                    </div>
                </li>

                <li class="list-slider">
                    <label class="slider-label">Invert</label>
                    <div class="slider" id="slider-invert" ng-model="value">
                        <div id="custom-handle-invert" class="ui-slider-handle"></div>
                    </div>
                </li>

                <li class="list-slider">
                    <label class="slider-label">Brightness</label>
                    <div class="slider" id="slider-brightness" ng-model="value">
                        <div id="custom-handle-brightness" class="ui-slider-handle"></div>
                    </div>
                </li>

                <li class="list-slider">
                    <label class="slider-label">Hue rotate</label>
                    <div class="slider" id="slider-hueRotate" ng-model="value">
                        <div id="custom-handle-hueRotate" class="ui-slider-handle"></div>
                    </div>
                </li>

                <li class="list-slider">
                    <label class="slider-label">Sepia</label>
                    <div class="slider" id="slider-sepia" ng-model="value">
                        <div id="custom-handle-sepia" class="ui-slider-handle"></div>
                    </div>
                </li>
            </ul>
        </div>
